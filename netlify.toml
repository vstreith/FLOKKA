# Configuration Netlify pour FLOKKA (Next.js 14 + Prisma/PostgreSQL Supabase)
[build]
  # `npm install` déclenche `postinstall` -> `prisma generate`.
  # On applique ensuite les migrations sur la base Supabase, puis on build Next.js.
  command = "npx prisma generate && npx prisma migrate deploy && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Évite que des avertissements npm ne fassent échouer le build.
  NPM_FLAGS = "--no-audit --no-fund"

# Runtime officiel Next.js (API routes -> fonctions serverless).
[[plugins]]
  package = "@netlify/plugin-nextjs"
